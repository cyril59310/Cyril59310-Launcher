<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyril59310 Launcher</title>
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>

  <main class="card">
    <header class="hero">
      <img class="hero-icon" src="assets/logo.png" alt="Icône du launcher" />
      <div>
        <h1>Cyril59310 Launcher</h1>
        <p class="subtitle">Launcher Minecraft (Java Edition) Microsoft.</p>
      </div>
      <button id="settingsBtn" type="button" class="secondary hero-settings-btn" aria-expanded="false" aria-controls="settingsModal">Parametres</button>
    </header>

    <section class="auth-card">
      <div class="auth-line">
        <strong>Compte Microsoft:</strong>
        <span id="msStatus">Non connecté</span>
      </div>
      <label for="msAccountSelect">Compte actif</label>
      <select id="msAccountSelect" aria-label="Compte Microsoft actif">
        <option value="">Aucun compte</option>
      </select>
      <div class="auth-actions">
        <button id="msLoginBtn" type="button">Ajouter un compte</button>
        <button id="msLogoutBtn" type="button" class="secondary">Supprimer le compte actif</button>
      </div>
    </section>

    <section class="update-card">
      <div class="auth-line">
        <strong>Mise a jour launcher:</strong>
        <span id="updateStatus">En attente...</span>
      </div>
      <div class="auth-actions">
        <button id="checkUpdateBtn" type="button" class="secondary">Verifier</button>
        <button id="installUpdateBtn" type="button" class="secondary" hidden>Installer la mise a jour</button>
      </div>
    </section>

    <form id="launchForm">
      <label for="version">Version</label>
      <select id="version" name="version" required>
        <option value="">Chargement des versions...</option>
      </select>

      <label class="checkbox-row" for="includeSnapshots">
        <input id="includeSnapshots" name="includeSnapshots" type="checkbox" />
        Afficher les versions snapshot
      </label>

      <label for="memoryMb">RAM max</label>
      <select id="memoryMb" name="memoryMb" required>
        <option value="4096">4 Go</option>
        <option value="8192">8 Go</option>
        <option value="16384">16 Go</option>
      </select>

      <button id="launchBtn" type="submit">Lancer Minecraft</button>
      <button id="openGameFolderBtn" type="button" class="secondary">Ouvrir le dossier du jeu</button>
    </form>

    <div class="status-wrapper">
      <div id="status">Prêt.</div>
      <div id="progress">Progression: 0%</div>
    </div>
    <div class="progress-bar" aria-hidden="true">
      <div id="progressFill" class="progress-fill"></div>
    </div>

    <pre id="logs" aria-live="polite"></pre>
  </main>

  <div id="settingsModal" class="settings-modal" hidden>
    <section class="settings-window" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="settings-header">
        <h2 id="settingsTitle" class="settings-title">Parametres du launcher</h2>
        <button id="closeSettingsBtn" type="button" class="secondary settings-close-btn" aria-label="Fermer les parametres">Fermer</button>
      </div>

      <label class="checkbox-row" for="disableGameConsole">
        <input id="disableGameConsole" name="disableGameConsole" type="checkbox" />
        Désactiver la console Java au lancement
      </label>

      <label class="checkbox-row" for="closeLauncherOnStart">
        <input id="closeLauncherOnStart" name="closeLauncherOnStart" type="checkbox" />
        Fermer le launcher au lancement du jeu
      </label>
    </section>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
